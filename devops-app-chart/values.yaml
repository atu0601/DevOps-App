# -- Nombre de réplicas
replicaCount: 3

image:
  repository: devops-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  automount: true
  annotations: {}

httpRoute:
  enabled: true
  parentRefs:
    - name: my-gateway
      namespace: devops-training
  hostnames:
    - devops.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters: []

ingress:
  enabled: true
  hosts:
    - host: devops.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# -- Configuration applicative
config:
  nodeEnv: production
  logLevel: info
  appPort: "3000"

# -- Base de données
postgresql:
  enabled: true
  auth:
    database: appdb
    username: appuser
    # Le password doit être fourni via --set ou un secret externe
  primary:
    persistence:
      size: 1Gi

# -- Probes
probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20

# -- Autoscaling
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70